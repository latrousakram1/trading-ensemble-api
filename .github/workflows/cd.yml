name: CD — Build Docker & Déploiement

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  workflow_run:
    workflows: ["CI — Tests & Qualité"]
    types: [ completed ]
    branches: [ main ]

env:
  IMAGE_NAME: trading-ensemble-api
  REGISTRY: ghcr.io

jobs:
  # ── Job 1 : Build & Push image Docker ─────────────────────────────────
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login au registre GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraction des métadonnées (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Setup Docker Buildx (multi-plateforme)
        uses: docker/setup-buildx-action@v3

      - name: Build et Push de l'image Docker
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Résumé du build
        run: |
          echo "## Image Docker construite" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  # ── Job 2 : Test de l'image construite ────────────────────────────────
  test-image:
    name: Test de l'image Docker
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login au registre
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull et test de l'image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
          echo "Test de l'image : $IMAGE"

          # Lancer le conteneur (sans modèles — test de démarrage uniquement)
          docker run -d --name test-api -p 8000:8000 \
            -e PYTHONUNBUFFERED=1 \
            $IMAGE || true

          # Attendre 15 secondes pour le démarrage
          sleep 15

          # Vérifier que le processus tourne
          docker ps | grep test-api && echo "✓ Conteneur démarré" || echo "⚠ Conteneur non démarré (normal sans modèles)"

          # Récupérer les logs
          docker logs test-api 2>&1 || true

          # Nettoyer
          docker stop test-api 2>/dev/null || true
          docker rm test-api 2>/dev/null || true

  # ── Job 3 : Déploiement local (optionnel — SSH) ────────────────────────
  deploy-local:
    name: Déploiement serveur local
    runs-on: ubuntu-latest
    needs: [ build-and-push, test-image ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Déploiement via SSH (à configurer)
        run: |
          echo "## Instructions déploiement local" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pour activer le déploiement SSH automatique :" >> $GITHUB_STEP_SUMMARY
          echo "1. Ajouter le secret \`SSH_PRIVATE_KEY\` dans les paramètres GitHub" >> $GITHUB_STEP_SUMMARY
          echo "2. Ajouter \`SERVER_HOST\` (IP du serveur)" >> $GITHUB_STEP_SUMMARY
          echo "3. Décommenter le bloc SSH ci-dessous" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image disponible : \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY

      # Décommentez ce bloc pour activer le déploiement SSH réel :
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1.0.0
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
