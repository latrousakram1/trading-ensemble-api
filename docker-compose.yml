version: '3.9'

services:
  trading-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading-ensemble-api:latest
    container_name: trading-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Monter les modèles et données depuis votre machine
      # Remplacez les chemins gauche (votre machine) si nécessaire
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./artifacts:/app/artifacts:ro
    environment:
      - PYTHONUNBUFFERED=1
      - OMP_NUM_THREADS=4
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
